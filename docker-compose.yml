services:
  postgres:
    image: postgres:16-alpine
    container_name: internship-coordinator-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-internship_coordinator}
      POSTGRES_USER: ${POSTGRES_USER:-coordinator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coordinator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-coordinator} -d ${POSTGRES_DB:-internship_coordinator}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: internship-coordinator-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env.docker
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-internship_coordinator}
      POSTGRES_USER: ${POSTGRES_USER:-coordinator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coordinator}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      VERTEX_AI_ENABLED: ${VERTEX_AI_ENABLED:-false}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-europe-west1}
      GCP_GEMINI_MODEL: ${GCP_GEMINI_MODEL:-gemini-2.5-flash}
      GCP_SERVICE_ACCOUNT_JSON: ${GCP_SERVICE_ACCOUNT_JSON:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      EMAIL_INTAKE_ENABLED: ${EMAIL_INTAKE_ENABLED:-false}
      EMAIL_INTAKE_MODE: ${EMAIL_INTAKE_MODE:-imap}
      GMAIL_IMAP_HOST: ${GMAIL_IMAP_HOST:-imap.gmail.com}
      GMAIL_IMAP_PORT: ${GMAIL_IMAP_PORT:-993}
      GMAIL_IMAP_USERNAME: ${GMAIL_IMAP_USERNAME:-}
      GMAIL_IMAP_PASSWORD: ${GMAIL_IMAP_PASSWORD:-}
      GMAIL_IMAP_FOLDER: ${GMAIL_IMAP_FOLDER:-INBOX}
      EMAIL_INTAKE_POLL_INTERVAL_SECONDS: ${EMAIL_INTAKE_POLL_INTERVAL_SECONDS:-60}
      TEST_DATASET_ENABLED: ${TEST_DATASET_ENABLED:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - upload_data:/app/uploads

  frontend:
    build:
      context: ${FE_BUILD_CONTEXT:-../internship_application_coordinator_fe}
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USE_MSW: "false"
    container_name: internship-coordinator-web
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
  upload_data:
