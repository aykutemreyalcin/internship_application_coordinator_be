spring:
  application:
    name: internship-application-coordinator
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: ${app.storage.max-file-size-bytes:10485760}
      max-request-size: ${app.storage.max-file-size-bytes:10485760}

server:
  port: 8080

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
    max-file-size-bytes: ${MAX_UPLOAD_SIZE_BYTES:10485760}
