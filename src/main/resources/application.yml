spring:
  application:
    name: internship-application-coordinator
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.local[.properties]
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: ${app.storage.max-file-size-bytes:10485760}
      max-request-size: ${app.storage.max-file-size-bytes:10485760}

server:
  port: 8080

app:
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
    max-file-size-bytes: ${MAX_UPLOAD_SIZE_BYTES:10485760}
  vertex-ai:
    enabled: ${VERTEX_AI_ENABLED:false}
    project-id: ${GCP_PROJECT_ID:}
    region: ${GCP_REGION:europe-west1}
    model-name: ${GCP_GEMINI_MODEL:gemini-2.5-flash}
  university-rules:
    config-path: ${UNIVERSITY_RULES_CONFIG_PATH:classpath:university-rules.json}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  email-intake:
    enabled: ${EMAIL_INTAKE_ENABLED:false}
    mode: ${EMAIL_INTAKE_MODE:imap}
    poll-interval-seconds: ${EMAIL_INTAKE_POLL_INTERVAL_SECONDS:60}
    imap:
      host: ${GMAIL_IMAP_HOST:imap.gmail.com}
      port: ${GMAIL_IMAP_PORT:993}
      username: ${GMAIL_IMAP_USERNAME:}
      password: ${GMAIL_IMAP_PASSWORD:}
      folder: ${GMAIL_IMAP_FOLDER:INBOX}
  test-dataset:
    enabled: ${TEST_DATASET_ENABLED:false}
