spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:internship_coordinator}
    username: ${POSTGRES_USER:coordinator}
    password: ${POSTGRES_PASSWORD:coordinator}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

logging:
  level:
    com.internship.coordinator: DEBUG
    org.springframework.web: INFO
